
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro SaaS Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: rgba(255,255,255,0.05); }
        body.light-mode { --bg: #f8fafc; --panel: rgba(0,0,0,0.05); }
        body { background: var(--bg); transition: all 0.3s; }
        .glass { background: var(--panel); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .animate-all * { transition: all 0.3s ease; }
    </style>
</head>
<body class="text-white min-h-screen p-4 md:p-8 animate-all">

<div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
    <div class="lg:col-span-1 glass p-6 rounded-2xl h-fit">
        <h2 class="text-xl font-bold mb-4">⚙️ Settings</h2>
        <div id="settingsPanel" class="space-y-3 text-sm"></div>
    </div>

    <div class="lg:col-span-3 space-y-6">
        <div class="glass p-8 rounded-2xl text-center" id="dropArea">
            <h1 class="text-3xl font-bold mb-2">Image to PDF Pro</h1>
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
            <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 px-6 py-2 rounded-lg font-semibold hover:bg-blue-700">Select Images</button>
        </div>

        <div id="previewGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        
        <div class="flex gap-4">
            <button id="convertBtn" onclick="processPDF()" class="flex-1 bg-green-600 py-4 rounded-xl font-bold hover:bg-green-700">Convert to PDF</button>
            <button id="clearBtn" onclick="clearAll()" class="px-6 bg-red-600 rounded-xl font-bold hover:bg-red-700">Clear</button>
        </div>
        <div id="progress" class="w-full bg-gray-700 h-2 rounded-full hidden overflow-hidden"><div id="bar" class="bg-blue-500 h-full w-0"></div></div>
    </div>
</div>

<script>
const CONFIG = {
    darkMode: true, glassEffect: true, animations: true, compression: true,
    autoA4: true, pageSize: 'a4', orientation: 'p'
};

const settings = [
    {id: 'darkMode', label: 'Dark Mode'}, {id: 'glassEffect', label: 'Glass UI'},
    {id: 'animations', label: 'Animations'}, {id: 'compression', label: 'Image Compression'},
    {id: 'autoA4', label: 'Auto Resize to A4'}
];

function initSettings() {
    const container = document.getElementById('settingsPanel');
    settings.forEach(s => {
        container.innerHTML += `<div class="flex justify-between items-center">
            <span>${s.label}</span>
            <input type="checkbox" ${CONFIG[s.id] ? 'checked' : ''} onchange="CONFIG['${s.id}']=this.checked; updateUI()">
        </div>`;
    });
}

function updateUI() {
    document.body.className = CONFIG.darkMode ? 'text-white' : 'light-mode text-black';
    if(!CONFIG.animations) document.body.classList.remove('animate-all');
    else document.body.classList.add('animate-all');
}

let files = [];
const input = document.getElementById('fileInput');
input.onchange = e => {
    Array.from(e.target.files).forEach(f => {
        files.push({ id: crypto.randomUUID(), file: f, url: URL.createObjectURL(f) });
    });
    render();
};

function render() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = '';
    files.forEach((f, i) => {
        const el = document.createElement('div');
        el.className = 'glass p-2 rounded-lg relative';
        el.innerHTML = `<img src="${f.url}" class="w-full h-24 object-cover rounded">
                        <button onclick="remove(${i})" class="absolute top-0 right-0 bg-red-500 rounded-full w-6 h-6 text-xs">×</button>`;
        grid.appendChild(el);
    });
}

function remove(index) {
    URL.revokeObjectURL(files[index].url);
    files.splice(index, 1);
    render();
}

function clearAll() {
    files.forEach(f => URL.revokeObjectURL(f.url));
    files = [];
    render();
}

async function processPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF(CONFIG.orientation, 'mm', CONFIG.pageSize);
    const bar = document.getElementById('bar');
    document.getElementById('progress').classList.remove('hidden');

    for(let i=0; i<files.length; i++) {
        bar.style.width = ((i+1)/files.length)*100 + '%';
        const img = await new Promise(r => {
            const i = new Image(); i.onload = () => r(i); i.src = files[i].url;
        });
        
        if(i > 0) doc.addPage();
        const w = doc.internal.pageSize.getWidth();
        const h = (img.height * w) / img.width;
        doc.addImage(img, 'JPEG', 0, 0, w, CONFIG.autoA4 ? (doc.internal.pageSize.getHeight()) : h, null, CONFIG.compression ? 'FAST' : 'NONE');
    }
    doc.save('document.pdf');
    document.getElementById('progress').classList.add('hidden');
}

initSettings();
updateUI();
</script>
</body>
</html>
