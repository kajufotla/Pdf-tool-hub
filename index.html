<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Utility Hub | PDF & Image Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<main class="max-w-5xl mx-auto">
    <!-- Header -->
    <header class="mb-12 text-center">
        <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Pro Utility Hub</h1>
        <p class="text-gray-400 mt-3">High-quality, secure tools for your daily tasks.</p>
    </header>

    <!-- Tool Navigation Grid -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Tool 1: Image to PDF -->
        <div class="glass p-6 rounded-2xl hover:border-blue-500 transition-all">
            <h2 class="text-xl font-bold mb-2">Image to PDF</h2>
            <p class="text-gray-400 text-sm mb-4">Convert your JPG, PNG, and WebP images to PDF instantly.</p>
            <a href="image-to-pdf/index.html" class="inline-block px-4 py-2 bg-blue-600 rounded-lg text-sm font-medium hover:bg-blue-500 transition">Open Tool</a>
        </div>

        <!-- Tool 2: PDF to Image (مثال کے طور پر) -->
        <div class="glass p-6 rounded-2xl hover:border-emerald-500 transition-all">
            <h2 class="text-xl font-bold mb-2">PDF to Image</h2>
            <p class="text-gray-400 text-sm mb-4">Extract high-quality images from your PDF files.</p>
            <a href="pdf-to-image/index.html" class="inline-block px-4 py-2 bg-emerald-600 rounded-lg text-sm font-medium hover:bg-emerald-500 transition">Open Tool</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="mt-20 text-center text-xs text-gray-600">
        <p>&copy; 2026 Hamid Hussain & Co. All rights reserved.</p>
    </footer>
</main>
</body>
</html>
