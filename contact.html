<!-- Contact Support Section -->
<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  
  <!-- Header / Branding -->
  <div class="sm:mx-auto sm:w-full sm:max-max-w-md text-center">
    <!-- Brand Logo Text -->
    <div class="flex items-center justify-center space-x-2 text-indigo-600 font-extrabold text-3xl tracking-tight">
      <svg class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
      </svg>
      <span>PDFExpert</span>
    </div>
    <h2 class="mt-6 text-center text-3xl font-bold text-gray-900 tracking-tight">
      Contact Support
    </h2>
    
    <!-- Response Time Notice -->
    <div class="mt-3 max-w-sm mx-auto bg-indigo-50 border border-indigo-100 rounded-lg p-3 text-sm text-indigo-700 font-medium">
      📧 We usually respond to queries within <span class="font-bold text-indigo-900">24 to 48 hours</span>.
    </div>
  </div>

  <!-- Form Container with Glass/Clean Design -->
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md px-4">
    <div class="bg-white/80 backdrop-blur-md py-8 px-6 shadow-xl border border-gray-100 rounded-2xl sm:px-10">
      <form class="space-y-6" action="#" method="POST">
        
        <!-- Name Field -->
        <div>
          <label for="name" class="block text-sm font-semibold text-gray-700">Full Name</label>
          <div class="mt-1">
            <input id="name" name="name" type="text" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150" placeholder="John Doe">
          </div>
        </div>

        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700">Email Address</label>
          <div class="mt-1">
            <input id="email" name="email" type="email" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150" placeholder="you@example.com">
          </div>
        </div>

        <!-- Subject Field -->
        <div>
          <label for="subject" class="block text-sm font-semibold text-gray-700">Subject</label>
          <div class="mt-1">
            <input id="subject" name="subject" type="text" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150" placeholder="How can we help you?">
          </div>
        </div>

        <!-- Message Field -->
        <div>
          <label for="message" class="block text-sm font-semibold text-gray-700">Your Message</label>
          <div class="mt-1">
            <textarea id="message" name="message" rows="4" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150" placeholder="Describe your issue or feedback here..."></textarea>
          </div>
        </div>

        <!-- Submit Button -->
        <div>
          <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 transform hover:-translate-y-0.5">
            Send Message
          </button>
        </div>
      </form>
      
      <!-- Footer website mention -->
      <div class="mt-6 text-center border-t border-gray-100 pt-4">
        <p class="text-xs text-gray-400">
          Official Support for <a href="https://pdfexpert.xyz" class="font-medium text-indigo-500 hover:text-indigo-600">pdfexpert.xyz</a>
        </p>
      </div>
    </div>
  </div>
</div>
